[git]
auto-local-bookmark = false

[revsets]
log = '''
  trunk()
  | (trunk()..@)::
  | heads(remote_bookmarks().. & mine())
  | bookmarks() ~ bookmarks(exact:"master") ~ bookmarks(exact:"main")
  | tracked_remote_bookmarks(remote="origin") ~ bookmarks(exact:"master") ~ bookmarks(exact:"main")'''

[[--scope]]
--when.repositories = ["~/dev/Karen"]
